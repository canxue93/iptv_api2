name: Daily Update

# 赋予actions推送代码权限
permissions:
  contents: write

on:
  schedule:
    # UTC 00:55 = 上海 08:55 每日执行
    - cron: '55 0 * * *'
    # 如需每3天凌晨上海0点执行，改用下面注释这条，替换上面cron
    # - cron: '55 16 */3 * *'
  workflow_dispatch:  # 手动触发

jobs:
  run_script:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai
      # 可选：脚本内读取时区
      TIME_ZONE: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 拉取完整历史，rebase更稳定
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: "pip"  # 内置pip缓存，替代单独cache步骤，简化配置

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests aiohttp

      - name: Run Python script
        run: python main.py
        # 脚本异常直接终止工作流，不执行后续提交
        if: always()

      - name: Check file changes & auto commit push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          # 检测是否有变更
          if ! git diff --staged --quiet; then
            echo "Detected file changes, commit & push..."
            git commit -m "Auto-update live files [${{ github.run_id }}]"
            # 拉取远端最新代码，冲突则终止不强制推送
            if git pull --rebase --autostash; then
              git push
            else
              echo "Merge conflict occurred, skip push"
              exit 1
            fi
          else
            echo "No file changes, skip commit"
          fi
